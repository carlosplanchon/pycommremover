name: Release

# Publishes to PyPI when a version tag (e.g. v0.4.1) is pushed, using PyPI
# Trusted Publishing (OIDC) -- no API token stored in the repo.
on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Run tests
        run: uv run pytest

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Verify tag matches project version
        run: |
          version="$(uv version --short)"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$version" != "$tag" ]; then
            echo "::error::Tag '${GITHUB_REF_NAME}' does not match pyproject version '${version}' (expected tag 'v${version}')."
            exit 1
          fi
          echo "OK: tag ${GITHUB_REF_NAME} matches version ${version}"

      - name: Build sdist and wheel
        run: uv build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest

    # Requires a manual approval if the `pypi` environment has reviewers set.
    environment:
      name: pypi
      url: https://pypi.org/p/pycommremover

    # Only this job can mint the OIDC token; test/build run without it. No
    # checkout and no project code run here -- it just uploads the artifacts.
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
